<!-- CÓDIGO DE MOTOR REPARADO Y OPTIMIZADO PARA ALPINE -->
    <script>
        function tuerkaApp() {
            return {
                currentView: 'tecnico',
                tipoReporte: 'video',
                clienteFotoCargada: false,

                legajoEnviado: false,
                comisionPagada: false,
                checkoutAbierto: false,
                tecnicoAceptoTyC: false,
                errorFormato: false,
                
                formTecnico: { nombre: '', cuit: '', email: '' }, 
                docs: { afip: false, afipExt: '', matricula: false, matriculaExt: '', antecedentes: false, antecedentesExt: '' },
                tecnico: { Nombre_Completo: "Carlos Pérez", Estado_Dispo: 'Baja' },
                orden: { ID_Orden: 3849, Estado: 'Pendiente Peritaje', Pliego_Asesor: 'Se detecta pérdida de presión por fisura en llave de paso.', Precio_Sugerido_Market: 45000, Zona_Aproximada: 'Palermo Soho, CABA', Direccion_Exacta: 'Guatemala 4821, Piso 3B' },
                asesorForm: { pliego: '', materiales: '', precio: 0 },
                etapasCliente: [
                    { label: "Peritaje Técnico", check: (estado) => estado === "Pendiente Peritaje" },
                    { label: "Técnico Asignado", check: (estado) => ["Publicada", "Aceptada"].includes(estado) },
                    { label: "En Camino", check: (estado) => estado === "En Camino" },
                    { label: "En Domicilio", check: (estado) => ["En Domicilio", "Terminada"].includes(estado) }
                ],

                // Manejo sincrónico unificado desde Alpine
                async enviarLegajo() {
                    const boton = document.getElementById('btnEnviar');
                    boton.disabled = true;
                    
                    try {
                        // Helper seguro para subir los archivos usando el ID del input
                        async function procesarArchivoUrl(idInput) {
                            const input = document.getElementById(idInput);
                            if (!input || input.files.length === 0) return '';
                            
                            const fileData = new FormData();
                            fileData.append('file', input.files[0]);
                            
                            const res = await fetch('https://file.io/?expires=1d', {
                                method: 'POST',
                                body: fileData
                            });
                            
                            if (!res.ok) throw new Error('Error al subir archivo intermedio');
                            const json = await res.json();
                            return json.success ? json.link : '';
                        }

                        boton.innerText = 'Procesando AFIP...';
                        const urlAfip = await procesarArchivoUrl('file_afip');

                        boton.innerText = 'Procesando Matrícula...';
                        const urlMatricula = await procesarArchivoUrl('file_matricula');

                        boton.innerText = 'Procesando Antecedentes...';
                        const urlAntecedentes = await procesarArchivoUrl('file_antecedentes');

                        boton.innerText = 'Registrando Legajo...';

                        // LEEMOS DIRECTAMENTE DESDE EL ESTADO DE ALPINE (formTecnico)
                        const payload = {
                            evento: "NUEVO_LEGAJO_AUDITORIA",
                            tecnico_nombre: this.formTecnico.nombre,
                            tecnico_cuit: this.formTecnico.cuit,
                            tecnico_email: this.formTecnico.email,
                            url_afip: urlAfip,
                            url_matricula: urlMatricula,
                            url_antecedentes: urlAntecedentes,
                            mensaje: "Se ha cargado un nuevo legajo con Constancia AFIP, Matrícula y Antecedentes para revisión de 24 hs."
                        };

                        const responseMake = await fetch("https://hook.us2.make.com/bmm7z3g7xmne05x2dbx7ttxtvqelhrdt", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });

                        if (responseMake.ok) {
                            this.legajoEnviado = true;
                            alert('¡Legajo enviado con éxito! La documentación fue resguardada para auditoría.');
                            document.getElementById('form-legajo-tecnico').reset();
                            this.formTecnico = { nombre: '', cuit: '', email: '' };
                            this.docs = { afip: false, afipExt: '', matricula: false, matriculaExt: '', antecedentes: false, antecedentesExt: '' };
                            this.tecnicoAceptoTyC = false;
                        } else {
                            throw new Error('Fallo en el endpoint de Make');
                        }

                    } catch (err) {
                        console.error("Error capturado:", err);
                        alert('Hubo un problema de transmisión de datos. Verifique su conexión e intente nuevamente.');
                    } finally {
                        boton.innerText = 'Enviar Legajo a Auditoría';
                        boton.disabled = false;
                    }
                },

                simularBotonPago() { this.checkoutAbierto = true; this.comisionPagada = true; },
                manejarCargaArchivo(tipo) {
                    const fileInput = event.target;
                    if (fileInput.files.length > 0) {
                        const extension = fileInput.files[0].name.toLowerCase().split('.').pop();
                        if (['pdf', 'jpg', 'jpeg', 'png'].includes(extension)) {
                            this.errorFormato = false; this.docs[tipo] = true; this.docs[tipo + 'Ext'] = extension;
                        } else {
                            this.errorFormato = true; this.docs[tipo] = false; fileInput.value = '';
                        }
                    }
                },
                liberarCartelera() { this.orden.Estado = 'Publicada'; this.currentView = 'tecnico'; },
                marcarEnCamino() { this.orden.Estado = 'En Camino'; },
                marcarYaLlegue() { this.orden.Estado = 'En Domicilio'; }
            }
        }
    </script>
