<!-- Formulario estructurado para el control de legajos de técnicos -->
<form id="form-tuerka">
    
    <input type="hidden" name="evento" value="nuevo_registro_tecnico">

    <div class="form-group">
        <label for="tecnico_nombre">Nombre Completo</label>
        <input type="text" id="tecnico_nombre" name="tecnico_nombre" placeholder="Juan Pérez" required>
    </div>

    <div class="form-group">
        <label for="tecnico_cuit">CUIT (Sin guiones)</label>
        <input type="text" id="tecnico_cuit" name="tecnico_cuit" placeholder="20123456789" pattern="[0-9]{11}" required>
    </div>

    <div class="form-group">
        <label for="tecnico_email">Correo Electrónico</label>
        <input type="email" id="tecnico_email" name="tecnico_email" placeholder="ejemplo@correo.com" required>
    </div>

    <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 25px 0;">

    <div class="form-group">
        <label for="constancia_afip">1. Constancia de Opción AFIP (PDF / Imagen)</label>
        <input type="file" id="constancia_afip" name="constancia_afip" accept=".pdf,.jpg,.jpeg,.png" required>
    </div>

    <div class="form-group">
        <label for="matricula">2. Matrícula Profesional Habilitante (PDF / Imagen)</label>
        <input type="file" id="matricula" name="matricula" accept=".pdf,.jpg,.jpeg,.png" required>
    </div>

    <div class="form-group">
        <label for="antecedentes">3. Certificado de Antecedentes Penales (PDF)</label>
        <input type="file" id="antecedentes" name="antecedentes" accept=".pdf,.jpg,.jpeg,.png" required>
    </div>

    <button type="submit" class="btn-submit" id="btnEnviar">Enviar Documentación</button>
</form>

<script>
document.getElementById('form-tuerka').addEventListener('submit', function(e) {
    e.preventDefault(); // Evita que la página salte al error 405
    
    const boton = document.getElementById('btnEnviar');
    boton.innerText = 'Enviando legajo...';
    boton.disabled = true;

    // Empaqueta los textos y los archivos binarios juntos de forma transparente
    const formData = new FormData(this);

    // Tu webhook de Make integrado de forma segura
    const urlMake = 'https://hook.us2.make.com/bmm7z3g7xmne05x2dbx7ttxtvqelhrdt'; 

    fetch(urlMake, {
        method: 'POST',
        body: formData 
    })
    .then(response => {
        alert('¡Legajo enviado con éxito! La documentación fue resguardada para auditoría.');
        document.getElementById('form-tuerka').reset();
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Hubo un problema de transmisión de archivos. Intente nuevamente.');
    })
    .finally(() => {
        boton.innerText = 'Enviar Documentación';
        boton.disabled = false;
    });
});
</script>
